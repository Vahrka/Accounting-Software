name: PySide6 Android APK (Fixed Wheel Paths)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf wget unzip zip git autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install packaging aqtinstall
          pip install PySide6==6.8.2.1
          pip install fpdf Jinja2 MarkupSafe numpy pandas peewee python-dateutil pytz PyYAML six tzdata zstandard

      - name: Create pysidedeploy.spec with Android target
        run: |
          cat > pysidedeploy.spec << 'EOF'
[app]
name = MyPySide6App
package_name = org.example.mypyside6app
version = 1.0.0
main_script = main.py
target = android
requirements = PySide6
android_permissions = INTERNET
android_manifest_minsdk = 21
android_manifest_targetsdk = 34

[buildozer]
android.release_artifact = apk
EOF

      - name: Download official Android wheels for PySide6
        id: download_wheels
        run: |
          mkdir -p android_wheels
          # Download the exact Qt version that matches PySide6 6.8.2
          aqt install-qt --outputdir android_wheels linux android 6.8.2 android_arm64_v8a -m all
          # Find the wheels
          WHEEL_PYSIDE=$(find android_wheels -type f -name "PySide6-*.whl" | head -1)
          WHEEL_SHIBOKEN=$(find android_wheels -type f -name "shiboken6-*.whl" | head -1)
          if [ -z "$WHEEL_PYSIDE" ] || [ -z "$WHEEL_SHIBOKEN" ]; then
            echo "Failed to download wheels"
            exit 1
          fi
          echo "wheel_pyside=$WHEEL_PYSIDE" >> $GITHUB_OUTPUT
          echo "wheel_shiboken=$WHEEL_SHIBOKEN" >> $GITHUB_OUTPUT
          echo "WHEEL_PYSIDE=$WHEEL_PYSIDE" >> $GITHUB_ENV
          echo "WHEEL_SHIBOKEN=$WHEEL_SHIBOKEN" >> $GITHUB_ENV

      - name: Ensure translation files exist
        run: |
          if [ -f "source.qrc" ]; then
            grep -oE 'src/i18n/[^"]+\.qm' source.qrc | while read -r qm_path; do
              mkdir -p "$(dirname "$qm_path")"
              touch "$qm_path"
            done
          fi

      - name: Compile Qt resources
        run: |
          if grep -q '<file' source.qrc; then
            pyside6-rcc source.qrc -o source_rc.py
          else
            echo "# empty resources" > source_rc.py
          fi

      - name: Build APK with explicit wheels
        run: |
          python -m venv build_venv
          source build_venv/bin/activate
          pip install --upgrade pip
          pip install packaging
          pip install PySide6==6.8.2.1
          pip install fpdf Jinja2 MarkupSafe numpy pandas peewee python-dateutil pytz PyYAML six tzdata zstandard
          yes | pyside6-android-deploy \
            --wheel-pyside "${{ steps.download_wheels.outputs.wheel_pyside }}" \
            --wheel-shiboken "${{ steps.download_wheels.outputs.wheel_shiboken }}" \
            --config pysidedeploy.spec \
            --verbose

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f -not -path "./android-sdk/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find ~/.pyside6-android-deploy -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK found. Listing directories:"
            find . -name "*.apk" 2>/dev/null || true
            ls -la .buildozer 2>/dev/null || true
            exit 1
          fi
          echo "APK: $APK_PATH"
          mkdir -p final_artifacts
          cp "$APK_PATH" final_artifacts/MyApp-android.apk
          echo "apk_path=final_artifacts/MyApp-android.apk" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PySide6-Android-APK
          path: final_artifacts/MyApp-android.apk
          retention-days: 7

      - name: Push to software-version branch
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          TARGET_BRANCH="software-version"
          if git ls-remote --heads origin "$TARGET_BRANCH" | grep -q "$TARGET_BRANCH"; then
            git fetch origin "$TARGET_BRANCH"
            git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH" origin/"$TARGET_BRANCH"
          else
            git checkout --orphan "$TARGET_BRANCH"
            git rm -rf . > /dev/null 2>&1 || true
          fi
          find . -name "*.apk" -type f -not -path "./.git/*" -delete
          cp final_artifacts/MyApp-android.apk ./MyApp-android.apk
          git add MyApp-android.apk
          git commit -m "Update Android APK - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push origin "$TARGET_BRANCH" --force
