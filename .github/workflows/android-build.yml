name: Build PySide6 Android APK (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write   # needed to push to branch

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf wget unzip zip

      - name: Set Android SDK & NDK environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6==6.8.2.1 packaging
          pip install fpdf Jinja2 MarkupSafe numpy pandas peewee python-dateutil pytz PyYAML six tzdata zstandard

      - name: Ensure main.py exists
        run: |
          if [ ! -f "main.py" ]; then
            printf '%s\n' \
              'import sys' \
              'from PySide6.QtWidgets import QApplication, QLabel, QVBoxLayout, QWidget' \
              '' \
              'class MainWindow(QWidget):' \
              '    def __init__(self):' \
              '        super().__init__()' \
              '        layout = QVBoxLayout()' \
              '        layout.addWidget(QLabel("PySide6 on Android"))' \
              '        self.setLayout(layout)' \
              '' \
              'if __name__ == "__main__":' \
              '    app = QApplication(sys.argv)' \
              '    w = MainWindow()' \
              '    w.show()' \
              '    sys.exit(app.exec())' > main.py
          fi

      - name: Ensure source.qrc exists
        run: |
          if [ ! -f "source.qrc" ]; then
            echo '<RCC><qresource prefix="/"/></RCC>' > source.qrc
          fi

      - name: Ensure pysidedeploy.spec with Android target
        run: |
          if [ ! -f "pysidedeploy.spec" ]; then
            cat > pysidedeploy.spec <<-EOF
          [app]
          name = MyPySide6App
          package_name = org.example.mypyside6app
          version = 1.0.0
          main_script = main.py
          target = android
          requirements = PySide6
          android_permissions = INTERNET
          android_manifest_minsdk = 21
          android_manifest_targetsdk = 34

          [buildozer]
          android.release_artifact = apk
          EOF
          else
            grep -q "^target\s*=\s*android" pysidedeploy.spec || echo "target = android" >> pysidedeploy.spec
          fi

      - name: Create dummy translation files if referenced in source.qrc
        run: |
          if [ -f "source.qrc" ]; then
            grep -oE 'src/i18n/[^"]+\.qm' source.qrc | while read -r f; do
              mkdir -p "$(dirname "$f")"
              touch "$f"
            done
          fi

      - name: Compile Qt resources
        run: |
          if grep -q '<file' source.qrc; then
            pyside6-rcc source.qrc -o source_rc.py
          else
            echo "# empty resources" > source_rc.py
          fi

      # ------------------------------------------------------------------
      # Build APK using pyside6-android-deploy
      # ------------------------------------------------------------------
      - name: Build APK
        run: |
          python -m venv build_venv
          source build_venv/bin/activate
          pip install --upgrade pip
          pip install packaging PySide6==6.8.2.1
          pip install fpdf Jinja2 MarkupSafe numpy pandas peewee python-dateutil pytz PyYAML six tzdata zstandard
          echo "Y" | pyside6-android-deploy --config pysidedeploy.spec --verbose

      # ------------------------------------------------------------------
      # Locate the generated APK (pyside6-android-deploy uses buildozer/p4a)
      # ------------------------------------------------------------------
      - name: Find APK file
        id: find_apk
        run: |
          # Search for any .apk file, excluding the Android SDK directory
          APK_PATH=$(find . -type f -name "*.apk" -not -path "./android-sdk/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            # Also check common p4a/buildozer output folders
            APK_PATH=$(find .buildozer -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            # Last resort: search whole home directory (slow but thorough)
            APK_PATH=$(find ~ -name "*.apk" -mmin -60 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found after build"
            echo "Directory tree (top 2 levels):"
            ls -la
            find . -maxdepth 3 -type d
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          # Copy to a known location for artifact upload
          mkdir -p artifacts
          cp "$APK_PATH" artifacts/app-debug.apk

      - name: Upload APK as artifact (for immediate download)
        uses: actions/upload-artifact@v4
        with:
          name: PySide6-Android-APK
          path: artifacts/app-debug.apk
          retention-days: 7

      # ------------------------------------------------------------------
      # Push APK to the 'software-version' branch (create/replace)
      # ------------------------------------------------------------------
      - name: Push APK to software-version branch
        run: |
          # Clone the repository's target branch (or create it)
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          TARGET_BRANCH="software-version"
          # Check if the branch exists remotely
          if git ls-remote --heads origin "$TARGET_BRANCH" | grep -q "$TARGET_BRANCH"; then
            git fetch origin "$TARGET_BRANCH"
            git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH" origin/"$TARGET_BRANCH"
          else
            git checkout --orphan "$TARGET_BRANCH"
            git rm -rf . > /dev/null 2>&1 || true
          fi
          
          # Remove previous APK files (keep only the new one)
          find . -name "*.apk" -type f -not -path "./.git/*" -delete 2>/dev/null || true
          
          # Copy the new APK into the branch root
          cp "${{ steps.find_apk.outputs.apk_path }}" ./MyApp-android.apk
          
          # Add and commit
          git add MyApp-android.apk
          git commit -m "Update Android APK - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          
          # Force push to overwrite previous content
          git push origin "$TARGET_BRANCH" --force
