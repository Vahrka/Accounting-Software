name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ----- Install system dependencies (patchelf needed for pyside6-android-deploy)
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk patchelf wget unzip zip

      # ----- Set up Android SDK and NDK using official action (no manual license issues)
      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 35.0.0
          ndk: '27.2.12479018'   # NDK r27c
          cmake: '3.22.1'

      - name: Set environment variables for SDK/NDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      # ----- Python and dependencies (same as Windows)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install PySide6==6.8.2.1
          pip install fpdf==1.7.2 Jinja2==3.1.6 MarkupSafe==3.0.2
          pip install numpy==2.2.3 ordered-set==4.1.0
          pip install pandas==2.2.3 peewee==3.17.9
          pip install python-dateutil==2.9.0.post0 pytz==2025.1
          pip install PyYAML==6.0.2 six==1.17.0 tzdata==2025.1 zstandard==0.23.0

      # ----- Auto-create missing files (fixed YAML syntax)
      - name: Ensure main.py exists
        run: |
          if [ ! -f "main.py" ]; then
            cat > main.py <<-EOF
          #!/usr/bin/env python3
          import sys
          from PySide6.QtWidgets import QApplication, QLabel, QVBoxLayout, QWidget

          class MainWindow(QWidget):
              def __init__(self):
                  super().__init__()
                  layout = QVBoxLayout()
                  layout.addWidget(QLabel("PySide6 on Android - Auto built"))
                  self.setLayout(layout)
                  self.setWindowTitle("MyApp")

          if __name__ == "__main__":
              app = QApplication(sys.argv)
              w = MainWindow()
              w.show()
              sys.exit(app.exec())
          EOF
            echo "Created default main.py"
          fi

      - name: Ensure source.qrc exists
        run: |
          if [ ! -f "source.qrc" ]; then
            echo '<RCC><qresource prefix="/"/></RCC>' > source.qrc
            echo "Created empty source.qrc"
          fi

      - name: Ensure pysidedeploy.spec exists
        run: |
          if [ ! -f "pysidedeploy.spec" ]; then
            cat > pysidedeploy.spec <<-EOF
          [app]
          name = MyPySide6App
          package_name = org.example.mypyside6app
          version = 1.0.0
          description = Built with GitHub Actions
          main_script = main.py
          requirements = PySide6
          android_permissions = INTERNET
          android_manifest_minsdk = 21
          android_manifest_targetsdk = 34

          [buildozer]
          android.release_artifact = apk
          EOF
            echo "Created default pysidedeploy.spec"
          fi

      - name: Compile Qt resources
        run: |
          if grep -q '<file' source.qrc; then
            pyside6-rcc source.qrc -o source_rc.py
          else
            echo "# empty resources" > source_rc.py
          fi

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          pyside6-android-deploy --config pysidedeploy.spec --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PySide6-Android-APK
          path: |
            **/*.apk
            !**/android-sdk/**
          retention-days: 7
