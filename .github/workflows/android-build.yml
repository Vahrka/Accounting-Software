name: Build PySide6 Android APK (Manual)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf wget unzip zip

      # Android SDK is already preinstalled on the runner
      - name: Set Android SDK & NDK environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6==6.8.2.1 packaging
          # Install your app’s other requirements
          pip install fpdf Jinja2 MarkupSafe numpy pandas peewee python-dateutil pytz PyYAML six tzdata zstandard

      - name: Ensure main.py exists
        run: |
          if [ ! -f "main.py" ]; then
            cat > main.py << 'EOF'
import sys
from PySide6.QtWidgets import QApplication, QLabel, QVBoxLayout, QWidget

class MainWindow(QWidget):
    def __init__(self):
        super().__init__()
        layout = QVBoxLayout()
        layout.addWidget(QLabel("PySide6 on Android"))
        self.setLayout(layout)

if __name__ == "__main__":
    app = QApplication(sys.argv)
    w = MainWindow()
    w.show()
    sys.exit(app.exec())
EOF
          fi

      - name: Ensure source.qrc exists
        run: |
          if [ ! -f "source.qrc" ]; then
            echo '<RCC><qresource prefix="/"/></RCC>' > source.qrc
          fi

      - name: Ensure pysidedeploy.spec with Android target
        run: |
          if [ ! -f "pysidedeploy.spec" ]; then
            cat > pysidedeploy.spec << 'EOF'
[app]
name = MyApp
package_name = org.example.myapp
version = 1.0.0
main_script = main.py
target = android
requirements = PySide6
android_permissions = INTERNET
android_manifest_minsdk = 21
android_manifest_targetsdk = 34

[buildozer]
android.release_artifact = apk
EOF
          else
            # Ensure target = android is present
            grep -q "^target\s*=\s*android" pysidedeploy.spec || echo "target = android" >> pysidedeploy.spec
          fi

      - name: Create dummy translation files if referenced in source.qrc
        run: |
          if [ -f "source.qrc" ]; then
            grep -oE 'src/i18n/[^"]+\.qm' source.qrc | while read -r f; do
              mkdir -p "$(dirname "$f")"
              touch "$f"
            done
          fi

      - name: Compile Qt resources
        run: |
          if grep -q '<file' source.qrc; then
            pyside6-rcc source.qrc -o source_rc.py
          else
            echo "# empty resources" > source_rc.py
          fi

      # ------------------------------------------------------------------
      # Android build using pyside6-deploy (official method)
      # ------------------------------------------------------------------
      - name: Build APK
        run: |
          python -m venv build_venv
          source build_venv/bin/activate
          pip install --upgrade pip
          pip install packaging PySide6==6.8.2.1
          pip install fpdf Jinja2 MarkupSafe numpy pandas peewee python-dateutil pytz PyYAML six tzdata zstandard
          # Accept any license prompts automatically
          echo "Y" | pyside6-deploy --config pysidedeploy.spec --verbose

      - name: Locate and prepare APK
        id: find_apk
        run: |
          # Typical output paths for pyside6-deploy Android builds
          APK_FILE=$(find . -type f -name "*.apk" -not -path "./android-sdk/*" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "APK not found. Listing directories for debug:"
            ls -la
            find . -name "*.apk" 2>/dev/null || true
            find . -name "*release*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: $APK_FILE"
          mkdir -p artifacts
          cp "$APK_FILE" artifacts/app-unsigned.apk
          echo "apk_path=artifacts/app-unsigned.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PySide6-Android-APK
          path: artifacts/app-unsigned.apk
          retention-days: 7
