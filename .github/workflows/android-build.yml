name: Build PySide6 Android APK (Manual)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf wget unzip zip

      - name: Setup Android SDK & NDK
        run: |
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          export ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/27.2.12479018"
          
          sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --no_https <<< "y" || true
          sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --no_https \
            "platform-tools" "platforms;android-34" "build-tools;35.0.0"
          sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --no_https "ndk;27.2.12479018"
          
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and prepare Android wheels for PySide6
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall packaging
          # Download Android wheels (PySide6, shiboken6) for Qt 6.8.2
          aqt install-tool --outputdir $HOME/android_wheels linux desktop tools_android_wheels --arch x86_64
          # Actually, aqt may not be the best; let's use the official PySide6 deployment tool to fetch wheels
          pip install PySide6==6.8.2.1
          # The wheels will be cached by pyside6-deploy; we ensure it runs in a venv
          # Create venv for deployment
          python -m venv build_venv
          source build_venv/bin/activate
          pip install --upgrade pip
          pip install PySide6==6.8.2.1
          pip install fpdf Jinja2 MarkupSafe numpy ordered-set pandas peewee \
                      python-dateutil pytz PyYAML six tzdata zstandard
          # Now run pyside6-deploy once to cache the Android wheels
          echo "Y" | pyside6-deploy --target android --config pysidedeploy.spec --verbose || true
          # The above may still fail; we'll proceed to manual wheel download as fallback

      - name: Ensure main.py exists
        run: |
          if [ ! -f "main.py" ]; then
            cat > main.py <<-EOF
          #!/usr/bin/env python3
          import sys
          from PySide6.QtWidgets import QApplication, QLabel, QVBoxLayout, QWidget

          class MainWindow(QWidget):
              def __init__(self):
                  super().__init__()
                  layout = QVBoxLayout()
                  layout.addWidget(QLabel("PySide6 on Android - Auto built"))
                  self.setLayout(layout)
                  self.setWindowTitle("MyApp")

          if __name__ == "__main__":
              app = QApplication(sys.argv)
              w = MainWindow()
              w.show()
              sys.exit(app.exec())
          EOF
            echo "Created default main.py"
          fi

      - name: Ensure source.qrc exists
        run: |
          if [ ! -f "source.qrc" ]; then
            echo '<RCC><qresource prefix="/"/></RCC>' > source.qrc
            echo "Created empty source.qrc"
          fi

      - name: Ensure pysidedeploy.spec exists with Android target
        run: |
          if [ ! -f "pysidedeploy.spec" ]; then
            cat > pysidedeploy.spec <<-EOF
          [app]
          name = MyPySide6App
          package_name = org.example.mypyside6app
          version = 1.0.0
          description = Built with GitHub Actions
          main_script = main.py
          target = android
          requirements = PySide6
          android_permissions = INTERNET
          android_manifest_minsdk = 21
          android_manifest_targetsdk = 34

          [buildozer]
          android.release_artifact = apk
          EOF
            echo "Created default pysidedeploy.spec"
          fi

      - name: Ensure translation files exist
        run: |
          if [ -f "source.qrc" ]; then
            grep -oE 'src/i18n/[^"]+\.qm' source.qrc | while read -r qm_path; do
              mkdir -p "$(dirname "$qm_path")"
              if [ ! -f "$qm_path" ]; then
                echo "Creating dummy $qm_path"
                touch "$qm_path"
              fi
            done
          fi

      - name: Compile Qt resources
        run: |
          if grep -q '<file' source.qrc; then
            pyside6-rcc source.qrc -o source_rc.py
          else
            echo "# empty resources" > source_rc.py
          fi

      # ------------------------------------------------------------------
      #  Core Android build using the legacy tool with manual wheel download
      # ------------------------------------------------------------------
      - name: Download Android wheels manually
        run: |
          # Get the exact wheel URLs for PySide6 and shiboken6 for Android
          mkdir -p $HOME/android_wheels
          cd $HOME/android_wheels
          # Use pip download with the android platform specifier
          pip download --only-binary=:all: --platform android_arm64 --python-version 311 --implementation cp --abi cp311 \
            PySide6==6.8.2.1 shiboken6==6.8.2.1 -d .
          ls -la
          wheel_pyside=$(ls PySide6-*.whl)
          wheel_shiboken=$(ls shiboken6-*.whl)
          echo "WHEEL_PYSIDE=$HOME/android_wheels/$wheel_pyside" >> $GITHUB_ENV
          echo "WHEEL_SHIBOKEN=$HOME/android_wheels/$wheel_shiboken" >> $GITHUB_ENV

      - name: Build APK using pyside6-android-deploy with explicit wheels
        run: |
          source build_venv/bin/activate
          pyside6-android-deploy --name MyPySide6App \
            --wheel-pyside "$WHEEL_PYSIDE" \
            --wheel-shiboken "$WHEEL_SHIBOKEN" \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --ndk-path "$ANDROID_NDK_ROOT" \
            --config pysidedeploy.spec --verbose --force

      - name: Find and prepare APK for upload
        id: find_apk
        run: |
          # Search for any APK file in the entire workspace
          APK_PATH=$(find . -name "*.apk" -type f -not -path "./android-sdk/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found. Listing directories for debugging:"
            ls -la
            find . -name "*.apk" 2>/dev/null || true
            find . -name "*apk*" 2>/dev/null || true
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          mkdir -p artifacts
          cp "$APK_PATH" artifacts/app.apk
          echo "apk_path=artifacts/app.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PySide6-Android-APK
          path: artifacts/app.apk
          retention-days: 7
