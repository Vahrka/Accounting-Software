name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ----- Install JDK 17 (required for Android tools)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ----- Install system dependencies
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf wget unzip zip

      # ----- Setup Android SDK (using pre-installed SDK)
      - name: Setup Android SDK
        run: |
          # Use pre-installed Android SDK on Ubuntu runner
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          export ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/27.2.12479018"
          
          # Accept all licenses using JDK 17
          sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --no_https <<< "y" || true
          
          # Install required platforms and build tools
          sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --no_https \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;35.0.0"
          
          # Install NDK
          sudo $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --no_https \
            "ndk;27.2.12479018"
          
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          
      # ----- Python and dependencies
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install PySide6==6.8.2.1
          pip install fpdf==1.7.2 Jinja2==3.1.6 MarkupSafe==3.0.2
          pip install numpy==2.2.3 ordered-set==4.1.0
          pip install pandas==2.2.3 peewee==3.17.9
          pip install python-dateutil==2.9.0.post0 pytz==2025.1
          pip install PyYAML==6.0.2 six==1.17.0 tzdata==2025.1 zstandard==0.23.0

      # ----- Auto-create missing files
      - name: Ensure main.py exists
        run: |
          if [ ! -f "main.py" ]; then
            cat > main.py <<-EOF
          #!/usr/bin/env python3
          import sys
          from PySide6.QtWidgets import QApplication, QLabel, QVBoxLayout, QWidget

          class MainWindow(QWidget):
              def __init__(self):
                  super().__init__()
                  layout = QVBoxLayout()
                  layout.addWidget(QLabel("PySide6 on Android - Auto built"))
                  self.setLayout(layout)
                  self.setWindowTitle("MyApp")

          if __name__ == "__main__":
              app = QApplication(sys.argv)
              w = MainWindow()
              w.show()
              sys.exit(app.exec())
          EOF
            echo "Created default main.py"
          fi

      - name: Ensure source.qrc exists
        run: |
          if [ ! -f "source.qrc" ]; then
            echo '<RCC><qresource prefix="/"/></RCC>' > source.qrc
            echo "Created empty source.qrc"
          fi

      - name: Ensure pysidedeploy.spec exists
        run: |
          if [ ! -f "pysidedeploy.spec" ]; then
            cat > pysidedeploy.spec <<-EOF
          [app]
          name = MyPySide6App
          package_name = org.example.mypyside6app
          version = 1.0.0
          description = Built with GitHub Actions
          main_script = main.py
          requirements = PySide6
          android_permissions = INTERNET
          android_manifest_minsdk = 21
          android_manifest_targetsdk = 34

          [buildozer]
          android.release_artifact = apk
          EOF
            echo "Created default pysidedeploy.spec"
          fi

      - name: Compile Qt resources
        run: |
          if grep -q '<file' source.qrc; then
            pyside6-rcc source.qrc -o source_rc.py
          else
            echo "# empty resources" > source_rc.py
          fi

      - name: Build APK
        run: |
          pyside6-android-deploy --config pysidedeploy.spec --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PySide6-Android-APK
          path: |
            **/*.apk
            !**/android-sdk/**
          retention-days: 7
