name: Manual Android APK Build (PySide6)

on:
  workflow_dispatch:                # manual run only

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. Create default files if they are missing
      # ------------------------------------------------------------
      - name: Ensure main.py exists
        run: |
          if [ ! -f "main.py" ]; then
            cat > main.py << 'EOF'
#!/usr/bin/env python3
import sys
from PySide6.QtWidgets import QApplication, QLabel, QVBoxLayout, QWidget

class MainWindow(QWidget):
    def __init__(self):
        super().__init__()
        layout = QVBoxLayout()
        label = QLabel("PySide6 on Android - Auto generated")
        layout.addWidget(label)
        self.setLayout(layout)
        self.setWindowTitle("My App")

if __name__ == "__main__":
    app = QApplication(sys.argv)
    window = MainWindow()
    window.show()
    sys.exit(app.exec())
EOF
            echo "✅ Created default main.py"
          else
            echo "✅ main.py already exists"
          fi

      - name: Ensure source.qrc exists
        run: |
          if [ ! -f "source.qrc" ]; then
            echo '<RCC><qresource prefix="/"/></RCC>' > source.qrc
            echo "✅ Created empty source.qrc"
          else
            echo "✅ source.qrc already exists"
          fi

      - name: Ensure pysidedeploy.spec exists
        run: |
          if [ ! -f "pysidedeploy.spec" ]; then
            cat > pysidedeploy.spec << 'EOF'
[app]
name = MyPySide6App
package_name = org.example.mypyside6app
version = 1.0.0
description = My PySide6 Application
main_script = main.py
requirements = PySide6
android_permissions = INTERNET
android_manifest_minsdk = 21
android_manifest_targetsdk = 34

[buildozer]
android.release_artifact = apk
EOF
            echo "✅ Created default pysidedeploy.spec"
          else
            echo "✅ pysidedeploy.spec already exists"
          fi

      # ------------------------------------------------------------
      # 2. Install system dependencies & Android SDK/NDK
      # ------------------------------------------------------------
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk patchelf wget unzip zip

      - name: Setup Android SDK and NDK
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          export ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk"
          mkdir -p "$ANDROID_SDK_ROOT"

          cd "$ANDROID_SDK_ROOT"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip

          yes | cmdline-tools/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null 2>&1
          cmdline-tools/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-34" "build-tools;35.0.0"

          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          mv android-ndk-r27c "$ANDROID_NDK_ROOT"
          rm android-ndk-r27c-linux.zip

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 fpdf Jinja2 pandas peewee PyYAML

      - name: Compile Qt resources (if needed)
        run: |
          if grep -q '<file' source.qrc; then
            pyside6-rcc source.qrc -o source_rc.py
            echo "✅ Compiled source.qrc"
          else
            echo "⚠️ No resources to compile, creating dummy source_rc.py"
            echo "# empty resources" > source_rc.py
          fi

      # ------------------------------------------------------------
      # 3. Build APK
      # ------------------------------------------------------------
      - name: Build APK with pyside6-android-deploy
        run: |
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          export ANDROID_NDK_ROOT="$HOME/android-sdk/ndk"
          pyside6-android-deploy --config pysidedeploy.spec --verbose

      - name: Locate and upload APK
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No APK generated!"
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK" artifacts/app-unsigned.apk
          echo "APK_PATH=artifacts/app-unsigned.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PySide6-Android-APK
          path: artifacts/app-unsigned.apk
          retention-days: 7
