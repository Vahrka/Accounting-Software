name: Build PySide6 Windows Application

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Windows-compatible dependencies
        run: |
          python -m pip install --upgrade pip
          # Install all packages EXCEPT patchelf (Linux-only)
          pip install fpdf==1.7.2
          pip install Jinja2==3.1.6
          pip install MarkupSafe==3.0.2
          pip install Nuitka==2.5.1
          pip install numpy==2.2.3
          pip install ordered-set==4.1.0
          pip install pandas==2.2.3
          pip install peewee==3.17.9
          pip install PySide6==6.8.2.1
          pip install python-dateutil==2.9.0.post0
          pip install pytz==2025.1
          pip install PyYAML==6.0.2
          pip install six==1.17.0
          pip install tzdata==2025.1
          pip install zstandard==0.23.0
          
      - name: Verify installation
        run: pip list | findstr "PySide6 pandas numpy"

      - name: Compile Qt Resources
        run: pyside6-rcc source.qrc -o source_rc.py

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: main.py
          mode: standalone
          onefile: true
          enable-plugins: pyside6
          windows-console-mode: disable
          windows-icon-from-ico: src/gui/resources/imgs/icon.ico
          include-data-dir: |
            src/i18n=src/i18n
            src/gui/styles=src/gui/styles
            src/gui/resources/fonts=src/gui/resources/fonts
            src/gui/resources/imgs=src/gui/resources/imgs
            src/gui/resources/svg=src/gui/resources/svg
          include-module: |
            src
          output-dir: build_output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YourApp-Windows-x64
          path: build_output/*.exe
